name: 定时监控

on:
  schedule:
    # 每天北京时间上午9点执行（UTC时间1点）
    - cron: '0 1 * * *'
  workflow_dispatch:   # 这个让你可以手动运行，方便测试

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install yfinance
      
      - name: 运行铜价监控脚本
        run: |
          python monitor.py
